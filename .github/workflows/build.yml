name: Build & Deploy CloudStream Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.13

      - name: Build Extensions
        run: |
          for i in 1 2 3; do
            gradle make && break || sleep 30
          done

      - name: Prepare builds folder
        run: |
          mkdir -p builds
          cp NoodleMagazineProvider/build/NoodleMagazineProvider.cs3 builds/ && cp PmovieProvider/build/PmovieProvider.cs3 builds/
          cat > builds/plugins.json << 'JSON'
          [
            {
              "url": "https://raw.githubusercontent.com/senkuboy0-cyber/NoodleMagazineProvider/builds/NoodleMagazineProvider.cs3",
              "internalName": "NoodleMagazineProvider",
              "tvTypes": ["NSFW", "Others"],
              "language": "en",
              "name": "NoodleMagazine",
              "authors": ["senkuboy0-cyber"],
              "version": 2,
              "description": "NoodleMagazine - Free Videos",
              "repositoryUrl": "https://github.com/senkuboy0-cyber/NoodleMagazineProvider",
              "status": 1
            },
            {
              "url": "https://raw.githubusercontent.com/senkuboy0-cyber/NoodleMagazineProvider/builds/PmovieProvider.cs3",
              "internalName": "PmovieProvider",
              "tvTypes": ["Movie", "NSFW", "Others"],
              "language": "en",
              "name": "560pmovie",
              "authors": ["senkuboy0-cyber"],
              "version": 1,
              "description": "560pmovie - Free Videos",
              "repositoryUrl": "https://github.com/senkuboy0-cyber/NoodleMagazineProvider",
              "status": 1
            }
          ]
          JSON
          cat > builds/repo.json << 'JSON'
          {
            "name": "NoodleMagazine Provider",
            "description": "NoodleMagazine - Free Videos",
            "manifestVersion": 1,
            "pluginLists": [
              "https://raw.githubusercontent.com/senkuboy0-cyber/NoodleMagazineProvider/builds/plugins.json"
            ]
          }
          JSON

      - name: Deploy to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: builds
          clean: true
